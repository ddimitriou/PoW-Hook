name: CI

on:
  push:
    branches: ["**"]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - '.env.example'
  pull_request:
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - '.env.example'

# Cancel any in-flight run for the same ref when a newer one arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Job 0: Linter
  # ---------------------------------------------------------------------------
  lint:
    name: Linter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install flake8
        run: |
          python -m venv .venv
          .venv/bin/pip install flake8

      - name: Run flake8
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          .venv/bin/flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=.venv,.pytest_cache
          # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
          .venv/bin/flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics --exclude=.venv,.pytest_cache

  # ---------------------------------------------------------------------------
  # Job 1: Unit tests
  # ---------------------------------------------------------------------------
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install cryptography pytest

      - name: Configure git globals
        run: |
          git config --global user.email "ci@test.com"
          git config --global user.name  "CI"
          git config --global init.defaultBranch master

      - name: Run unit tests
        run: python -m pytest tests/test_hooks.py -v --tb=short

  # ---------------------------------------------------------------------------
  # Job 2: E2E – GitHub SSH key verification
  # Calls verify_pow.py directly against a local mock GitHub API server.
  # ---------------------------------------------------------------------------
  e2e-github-ssh:
    name: "E2E: GitHub SSH verification"
    runs-on: ubuntu-latest
    needs: unit-tests
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install cryptography

      - name: Configure git globals
        run: |
          git config --global user.email "ci@test.com"
          git config --global user.name  "CI"

      - name: Run GitHub SSH E2E test
        env:
          PYTHON: python3
        run: bash tests/test_ci_github_ssh.sh

  # ---------------------------------------------------------------------------
  # Job 3: E2E – Trufflehog secret scan (Docker for scan)
  # Exercises the pre-commit hook and then calls verify_pow.py directly.
  # ---------------------------------------------------------------------------
  e2e-trufflehog:
    name: "E2E: Trufflehog scan"
    runs-on: ubuntu-latest
    needs: unit-tests
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install cryptography

      - name: Configure git globals
        run: |
          git config --global user.email "ci@test.com"
          git config --global user.name  "CI"

      - name: Pull trufflehog image
        run: docker pull trufflesecurity/trufflehog:latest

      - name: Run Trufflehog E2E test
        env:
          PYTHON: python3
        run: bash tests/test_ci_trufflehog.sh
